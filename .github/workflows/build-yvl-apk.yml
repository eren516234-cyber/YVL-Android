name: Build YVL APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YVL Release APK
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept SDK Licenses
      run: yes | sdkmanager --licenses 2>/dev/null || true

    - name: Setup Gradle 8.6
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.6'

    - name: Generate Signing Keystore
      run: |
        keytool -genkeypair -v \
          -keystore yvl.jks -alias yvl \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass yvl12345 -keypass yvl12345 \
          -dname "CN=YVL,OU=YVL,O=YVL,L=IN,ST=IN,C=IN"

    - name: Build Release APK
      run: |
        gradle assembleRelease \
          -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/yvl.jks \
          -Pandroid.injected.signing.store.password=yvl12345 \
          -Pandroid.injected.signing.key.alias=yvl \
          -Pandroid.injected.signing.key.password=yvl12345 \
          --no-daemon --stacktrace

    - name: List APKs
      run: find . -name '*.apk' -exec ls -lh {} \;

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YVL-release-arm64
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
